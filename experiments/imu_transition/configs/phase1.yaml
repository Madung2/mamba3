task: transition
window_size: 128
stride: 64
channel_modes:
  - acc
  - gyro
  - acc_gyro
models:
  - cnn
  - gru
  - tcn
  - transformer
  - mamba3
split: random
train_ratio: 0.70
val_ratio: 0.15
test_ratio: 0.15
seed: 42
batch_size: 64
num_workers: 4
epochs: 50
subset_fraction: 1.0
lr: 0.001
weight_decay: 0.0001
early_stop_patience: 10
early_stop_metric: transition_f1
device: cuda
normalize: true
data_root: data/uci_har_pt
output_root: outputs/imu_transition
timing_warmup_runs: 25
timing_num_runs: 100
models_config:
  cnn:
    hidden_channels:
      - 64
      - 128
      - 128
    kernel_sizes:
      - 5
      - 3
      - 3
    dropout: 0.1
  gru:
    hidden_size: 64
    num_layers: 2
    dropout: 0.1
  tcn:
    channels:
      - 64
      - 64
      - 128
      - 128
    kernel_size: 3
    dropout: 0.1
  transformer:
    d_model: 64
    num_heads: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.1
  mamba3:
    d_model: 128
    d_state: 64
    expand: 2
    headdim: 64
    n_layers: 2
    dropout: 0.1
    chunk_size: 16
