services:
  mamba3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    image: mamba3:cuda12.8
    container_name: mamba3
    working_dir: /workspace/mamba3
    volumes:
      - .:/workspace/mamba3
      - mamba3-uv-cache:/root/.cache/uv
      - mamba3-triton-cache:/root/.triton
      - mamba3-torch-cache:/root/.cache/torch
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CUDA_HOME: /usr/local/cuda
      TORCH_CUDA_ARCH_LIST: "12.0"
      PYTHONUNBUFFERED: "1"
    gpus: all
    ipc: host
    shm_size: 32gb
    ulimits:
      memlock: -1
      stack: 67108864
    tty: true
    stdin_open: true
    command: bash

volumes:
  mamba3-uv-cache:
  mamba3-triton-cache:
  mamba3-torch-cache:
